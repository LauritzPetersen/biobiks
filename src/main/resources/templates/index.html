<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BioBiks - Forside</title>
</head>
<body>
<div style="text-align: right; padding: 10px; background-color: #f4f4f4; border-bottom: 1px solid #ccc; margin-bottom: 20px;">

    <div th:if="${loggedInUser == null}">
        <a href="/cart">
            Se Kurv 🛒
            (<span th:text="${session.cart != null ? session.cart.movies.size() + session.cart.snacks.size() : 0}">0</span>)
        </a>
        <span>Gæst</span> |
        <a href="/kiosk">Kiosk</a> |
        <a href="/login">Log ind</a> |
        <a href="/register">Opret profil</a>
    </div>

    <div th:if="${loggedInUser != null}">
        <a href="/cart">
            Se Kurv 🛒
            (<span th:text="${session.cart != null ? session.cart.movies.size() + session.cart.snacks.size() : 0}">0</span>)
        </a>
        <a href="/kiosk">Kiosk</a> |
        <strong>Velkommen, <a href="/profile" th:text="${loggedInUser.name}" style="color: #007bff; text-decoration: none;">Bruger</a></strong> |
        <a href="/logout">Log ud</a>
    </div>

    </div>

    <h1>Velkommen til BioBiks!</h1>

    <div style="text-align: center; margin-top: 50px; padding: 50px 20px; background-color: #2c3e50; color: white; border-radius: 8px;">
        <h1 style="font-size: 48px; margin-bottom: 10px;">Velkommen til BioBiks 🍿</h1>
        <p style="font-size: 20px; margin-bottom: 30px;">Din lokale biograf med de nyeste film og de sprødeste popcorn.</p>

        <a href="/movies" style="display: inline-block; padding: 15px 30px; background-color: #e74c3c; color: white; text-decoration: none; border-radius: 5px; font-size: 20px; font-weight: bold;">
        Se Biografprogrammet her
        </a>
    </div>

</body>
</html>
